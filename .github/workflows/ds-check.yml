name: design-check
on:
  pull_request:
  push:
    branches: [main]
jobs:
  ds-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run design system check
        run: node scripts/check-design.mjs
        continue-on-error: false
